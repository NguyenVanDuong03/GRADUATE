<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời Lễ Tốt Nghiệp</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #FFFFFF;
            color: #001F3F;
            font-family: 'Arial', sans-serif;
        }
        .card {
            background-color: #FFFFFF;
            border: 2px solid #FFD700;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #001F3F;
            color: #FFD700;
            text-align: center;
            padding: 20px;
            border-top-left-radius: 13px;
            border-top-right-radius: 13px;
        }
        .card-body {
            padding: 30px;
            text-align: center;
        }
        .btn-custom {
            background-color: #FFD700;
            color: #001F3F;
            border: none;
        }
        .btn-custom:hover {
            background-color: #001F3F;
            color: #FFD700;
        }
        .illustration {
            max-width: 100%;
            height: auto;
        }
        .fade-in {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .show {
            opacity: 1;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h2>Thiệp Mời Lễ Tốt Nghiệp</h2>
                    </div>
                    <div class="card-body fade-in">
                        <!-- Hình minh họa: Mũ tốt nghiệp -->
                        <img src="https://img.freepik.com/free-vector/graduation-cap_1284-128.jpg" alt="Mũ tốt nghiệp" class="illustration mb-4">
                        <p class="lead">Mình trân trọng mời anh em, bạn bè đến tham dự buổi Lễ Tốt Nghiệp để cùng chia sẻ niềm vui.</p>
                        <hr>
                        <p><strong>Thời gian:</strong> 8h00 ngày 30/09/2025</p>
                        <p><strong>Địa điểm:</strong> Hội trường A, Trường Đại học XYZ</p>
                        <hr>
                        <p>Sự hiện diện của mọi người sẽ là niềm vui lớn trong ngày trọng đại này.</p>
                        <!-- Nút với animation hover -->
                        <button class="btn btn-custom mt-3" id="rsvp-btn">Xác Nhận Tham Dự</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script>
        $(document).ready(function() {
            // FadeIn khi load
            $('.fade-in').addClass('show');

            // Animation khi hover nút
            $('#rsvp-btn').hover(function() {
                $(this).animate({ scale: 1.05 }, 200);
            }, function() {
                $(this).animate({ scale: 1 }, 200);
            });
        });
    </script>
</body>
</html>
